---
name: "Bug report"
description: "Report a bug with the integration"
labels: "Bug"
body:
- type: markdown
  attributes:
    value: Before you open a new issue, search through the existing issues to see if others have had the same problem.
- type: textarea
  attributes:
    label: "System Health details"
    description: "Paste the data from the System Health card in Home Assistant (https://www.home-assistant.io/more-info/system-health#github-issues)"
  validations:
    required: true
- type: checkboxes
  attributes:
    label: Checklist
    options:
      - label: I reviewed any attached logs and diagnostics for private data.
        required: true
      - label: I have filled out the issue template to the best of my ability.
        required: true
      - label: This issue only contains 1 issue (if you have multiple issues, open one issue for each issue).
        required: true
      - label: This issue is not a duplicate issue of any [previous issues](https://github.com/chaseflick4/ultraloq-ble-ha/issues?q=is%3Aissue+label%3A%22Bug%22+)..
        required: true
- type: textarea
  attributes:
    label: "Describe the issue"
    description: "A clear and concise description of what the issue is."
  validations:
    required: true
- type: textarea
  attributes:
    label: Reproduction steps
    description: "Without steps to reproduce, it will be hard to fix. It is very important that you fill out this part. Issues without it will be closed."
    value: |
      1.
      2.
      3.
      ...
  validations:
    required: true
- type: textarea
  attributes:
    label: "Debug logs"
    description: "Attach only the shortest relevant log excerpt. Never post Xthings credentials, lock PINs/admin credentials, UIDs, tokens, keys, packets, serial numbers, or Bluetooth addresses. Review the text before submitting."
    render: text
  validations:
    required: false

- type: textarea
  attributes:
    label: "Diagnostics dump"
    description: "Prefer the integration diagnostics dump over raw debug logs, and still review it before uploading. (see https://www.home-assistant.io/integrations/diagnostics/ for info)"
